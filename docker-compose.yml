version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: farumasi_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: farumasi_dev
    ports:
      - "5432:5432"
    volumes:
      - farumasi_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: farumasi_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  farumasi_pgdata:
