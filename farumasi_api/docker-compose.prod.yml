# Production-style stack: API image + Postgres + Redis.
# Usage:
#   cp .env.example .env   # edit secrets for production
#   docker compose -f docker-compose.prod.yml up -d --build
#
# First-time DB setup (after containers are healthy):
#   docker compose -f docker-compose.prod.yml exec api python scripts/seed.py

services:
  api:
    build: .
    image: farumasi-api:latest
    container_name: farumasi_api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      PORT: "8000"
      RUN_MIGRATIONS: "${RUN_MIGRATIONS:-true}"
      ASYNC_DATABASE_URL: postgresql+asyncpg://farumasi:farumasi_pass@db:5432/farumasi_db
      DATABASE_URL: postgresql://farumasi:farumasi_pass@db:5432/farumasi_db
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    container_name: farumasi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: farumasi
      POSTGRES_PASSWORD: farumasi_pass
      POSTGRES_DB: farumasi_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farumasi -d farumasi_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: farumasi_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  uploads_data:
